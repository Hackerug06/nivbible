<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bible Scripture Companion</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --background-color: #f4f4f4;
            --text-color: #333;
            --verse-highlight: #e9f3f8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            line-height: 1.8;
            background-color: var(--background-color);
            color: var(--text-color);
        }

        .container {
            width: 95%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        #app-header {
            background-color: var(--primary-color);
            color: white;
            text-align: center;
            padding: 1.5rem;
            margin-bottom: 20px;
            border-radius: 8px;
        }

        .navigation-section {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            gap: 10px;
        }

        #book-select, #chapter-select {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            background-color: white;
            font-size: 16px;
        }

        #scripture-content {
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
            padding: 25px;
            min-height: 400px;
            max-height: 500px;
            overflow-y: auto;
        }

        .verse {
            display: flex;
            margin-bottom: 10px;
            padding: 5px;
            transition: background-color 0.3s ease;
        }

        .verse:hover {
            background-color: var(--verse-highlight);
        }

        .verse-number {
            font-weight: bold;
            color: var(--secondary-color);
            margin-right: 10px;
            min-width: 30px;
        }

        .verse-text {
            flex-grow: 1;
        }

        .chapter-title {
            font-size: 1.5rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
            color: var(--primary-color);
        }

        .actions {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        .btn {
            background-color: var(--secondary-color);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .btn:hover {
            background-color: #2980b9;
        }

        /* Responsive Design */
        @media screen and (max-width: 768px) {
            .navigation-section {
                flex-direction: column;
            }

            #book-select, #chapter-select {
                width: 100%;
                margin-bottom: 10px;
            }

            #scripture-content {
                max-height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header id="app-header">
            <h1>Bible Scripture Companion</h1>
        </header>

        <div class="navigation-section">
            <select id="book-select">
                <option value="">Select Book</option>
            </select>
            <select id="chapter-select">
                <option value="">Select Chapter</option>
            </select>
        </div>

        <div id="scripture-content">
            <div id="chapter-display">
                <!-- Verses will be dynamically inserted here -->
            </div>
        </div>

        <div class="actions">
            <button id="prev-chapter" class="btn">Previous Chapter</button>
            <button id="next-chapter" class="btn">Next Chapter</button>
        </div>
    </div>

    <script>
        class BibleScriptureCompanion {
            constructor() {
                // Comprehensive Bible structure with sample verses
                this.bibleStructure = {
                    'Genesis': {
                        1: [
                            'In the beginning God created the heavens and the earth.',
                            'Now the earth was formless and empty, darkness was over the surface of the deep, and the Spirit of God was hovering over the waters.',
                            'And God said, "Let there be light," and there was light.',
                            'God saw that the light was good, and he separated the light from the darkness.',
                            'God called the light “day,” and the darkness he called “night.” And there was evening, and there was morning—the first day.',

'And God said, “Let there be a vault between the waters to separate water from water.”',
        'So God made the vault and separated the water under the vault from the water above it. And it was so.',
                           'God called the vault “sky.” And there was evening, and there was morning—the second day.',

'And God said, “Let the water under the sky be gathered to one place, and let dry ground appear.” And it was so.',
                            'God called the dry ground “land,” and the gathered waters he called “seas.” And God saw that it was good.',

'Then God said, “Let the land produce vegetation: seed-bearing plants and trees on the land that bear fruit with seed in it, according to their various kinds.” And it was so.',
        'The land produced vegetation: plants bearing seed according to their kinds and trees bearing fruit with seed in it according to their kinds. And God saw that it was good.',
        'And there was evening, and there was morning—the third day.',

'And God said, “Let there be lights in the vault of the sky to separate the day from the night, and let them serve as signs to mark sacred times, and days and years,',
                            'and let them be lights in the vault of the sky to give light on the earth.” And it was so.',
                            'God made two great lights—the greater light to govern the day and the lesser light to govern the night. He also made the stars.',
                            'God set them in the vault of the sky to give light on the earth,',
                            'to govern the day and the night, and to separate light from darkness. And God saw that it was good.',
                            ' And there was evening, and there was morning—the fourth day.',

'And God said, “Let the water teem with living creatures, and let birds fly above the earth across the vault of the sky.”',
                            'So God created the great creatures of the sea and every living thing with which the water teems and that moves about in it, according to their kinds, and every winged bird according to its kind. And God saw that it was good.',
                            'God blessed them and said, “Be fruitful and increase in number and fill the water in the seas, and let the birds increase on the earth.”',
                            'And there was evening, and there was morning—the fifth day.',

'And God said, “Let the land produce living creatures according to their kinds: the livestock, the creatures that move along the ground, and the wild animals, each according to its kind.” And it was so.',
                            'God made the wild animals according to their kinds, the livestock according to their kinds, and all the creatures that move along the ground according to their kinds. And God saw that it was good.',

'Then God said, “Let us make mankind in our image, in our likeness, so that they may rule over the fish in the sea and the birds in the sky, over the livestock and all the wild animals,[a] and over all the creatures that move along the ground.”',

'So God created mankind in his own image, in the image of God he created them; male and female he created them.',
'God blessed them and said to them, “Be fruitful and increase in number; fill the earth and subdue it. Rule over the fish in the sea and the birds in the sky and over every living creature that moves on the ground.”',

'Then God said, “I give you every seed-bearing plant on the face of the whole earth and every tree that has fruit with seed in it. They will be yours for food.',
                            'And to all the beasts of the earth and all the birds in the sky and all the creatures that move along the ground—everything that has the breath of life in it—I give every green plant for food.” And it was so.',

'God saw all that he had made, and it was very good. And there was evening, and there was morning—the sixth day.'
                            // ... more verses
                        ],
                        2: [
                            'Thus the heavens and the earth were completed in all their vast array.',
                            'By the seventh day God had finished the work he had been doing; so on the seventh day he rested from all his work.',
                            'Then God blessed the seventh day and made it holy, because on it he rested from all the work of creating that he had done.',

'This is the account of the heavens and the earth when they were created, when the Lord God made the earth and the heavens.',

'Now no shrub had yet appeared on the earth and no plant had yet sprung up, for the Lord God had not sent rain on the earth and there was no one to work the ground,',
                        'but streams[b] came up from the earth and watered the whole surface of the ground.',
                        'Then the Lord God formed a man from the dust of the ground and breathed into his nostrils the breath of life, and the man became a living being.',

'Now the Lord God had planted a garden in the east, in Eden; and there he put the man he had formed.',
                        'The Lord God made all kinds of trees grow out of the ground—trees that were pleasing to the eye and good for food. In the middle of the garden were the tree of life and the tree of the knowledge of good and evil.',

'A river watering the garden flowed from Eden; from there it was separated into four headwaters.',
                        'The name of the first is the Pishon; it winds through the entire land of Havilah, where there is gold.',
        '(The gold of that land is good; aromatic resin and onyx are also there.)',
                        'The name of the second river is the Gihon; it winds through the entire land of Cush.',
                        'The name of the third river is the Tigris; it runs along the east side of Ashur. And the fourth river is the Euphrates.',

'The Lord God took the man and put him in the Garden of Eden to work it and take care of it.',
                        'And the Lord God commanded the man, “You are free to eat from any tree in the garden;',
        'but you must not eat from the tree of the knowledge of good and evil, for when you eat from it you will certainly die.”',

'The Lord God said, “It is not good for the man to be alone. I will make a helper suitable for him.”',

'Now the Lord God had formed out of the ground all the wild animals and all the birds in the sky. He brought them to the man to see what he would name them; and whatever the man called each living creature, that was its name.',
                        'So the man gave names to all the livestock, the birds in the sky and all the wild animals. But for Adam no suitable helper was found.',
                        'So the Lord God caused the man to fall into a deep sleep; and while he was sleeping, he took one of the man’s ribs and then closed up the place with flesh.',
                        'Then the Lord God made a woman from the rib he had taken out of the man, and he brought her to the man.',

'The man said, “This is now bone of my bones and flesh of my flesh; she shall be called ‘woman,’ for she was taken out of man.”',

'That is why a man leaves his father and mother and is united to his wife, and they become one flesh.',

'Adam and his wife were both naked, and they felt no shame.'
                            // ... more verses
                        ]
                    },
                    'Exodus': {
                        1: [
                            'These are the names of the sons of Israel who went to Egypt with Jacob, each with his family:',
                            'Reuben, Simeon, Levi and Judah;',
                            'Issachar, Zebulun and Benjamin;',
                            // ... more verses
                        ],
                        2: [
                            'Now a man of the tribe of Levi married a Levite woman,',
                            'and she became pregnant and gave birth to a son.',
                            // ... more verses
                        ]
                    },
                    'Matthew': {
                        1: [
                            'This is the genealogy of Jesus the Messiah the son of David, the son of Abraham:',
                            'Abraham was the father of Isaac,',
                            'Isaac the father of Jacob,',
                            // ... more verses
                        ],
                        2: [
                            'After Jesus was born in Bethlehem in Judea, during the time of King Herod, Magi from the east came to Jerusalem',
                            'and asked, "Where is the one who has been born king of the Jews?"',
                            // ... more verses
                        ]
                    }
                };

                // Initialize DOM elements
                this.bookSelect = document.getElementById('book-select');
                this.chapterSelect = document.getElementById('chapter-select');
                this.chapterDisplay = document.getElementById('chapter-display');
                this.prevChapterBtn = document.getElementById('prev-chapter');
                this.nextChapterBtn = document.getElementById('next-chapter');

                // Current navigation state
                this.currentBook = null;
                this.currentChapter = null;

                // Setup initial state
                this.initializeBookSelect();
                this.attachEventListeners();
            }

            initializeBookSelect() {
                // Populate books
                Object.keys(this.bibleStructure).forEach(book => {
                    const option = document.createElement('option');
                    option.value = book;
                    option.textContent = book;
                    this.bookSelect.appendChild(option);
                });
            }

            attachEventListeners() {
                this.bookSelect.addEventListener('change', () => this.onBookChange());
                this.chapterSelect.addEventListener('change', () => this.displayChapter());
                this.prevChapterBtn.addEventListener('click', () => this.navigateChapter(-1));
                this.nextChapterBtn.addEventListener('click', () => this.navigateChapter(1));
            }

            onBookChange() {
                const selectedBook = this.bookSelect.value;
                
                // Reset chapter select
                this.chapterSelect.innerHTML = '<option value="">Select Chapter</option>';

                // Populate chapters for selected book
                if (selectedBook) {
                    Object.keys(this.bibleStructure[selectedBook]).forEach(chapter => {
                        const option = document.createElement('option');
                        option.value = chapter;
                        option.textContent = `Chapter ${chapter}`;
                        this.chapterSelect.appendChild(option);
                    });
                }
            }

            displayChapter() {
                const book = this.bookSelect.value;
                const chapter = this.chapterSelect.value;

                if (book && chapter) {
                    // Store current navigation state
                    this.currentBook = book;
                    this.currentChapter = parseInt(chapter);

                    // Clear previous chapter content
                    this.chapterDisplay.innerHTML = '';

                    // Add chapter title
                    const chapterTitle = document.createElement('div');
                    chapterTitle.classList.add('chapter-title');
                    chapterTitle.textContent = `${book} - Chapter ${chapter}`;
                    this.chapterDisplay.appendChild(chapterTitle);

                    // Render verses
                    const verses = this.bibleStructure[book][chapter];
                    verses.forEach((verseText, index) => {
                        const verseElement = document.createElement('div');
                        verseElement.classList.add('verse');
                        verseElement.innerHTML = `
                            <span class="verse-number">${index + 1}</span>
                            <span class="verse-text">${verseText}</span>
                        `;
                        this.chapterDisplay.appendChild(verseElement);
                    });

                    // Scroll to top of chapter
                    this.chapterDisplay.scrollTop = 0;
                }
            }

            navigateChapter(direction) {
                if (!this.currentBook || this.currentChapter === null) return;

                const bookChapters = Object.keys(this.bibleStructure[this.currentBook]);
                const currentChapterIndex = bookChapters.indexOf(this.currentChapter.toString());
                
                let newChapterIndex = currentChapterIndex + direction;

                // Wrap around if needed
                if (newChapterIndex < 0) {
                    newChapterIndex = bookChapters.length - 1;
                } else if (newChapterIndex >= bookChapters.length) {
                    newChapterIndex = 0;
                }

                // Update selects and display
                this.chapterSelect.value = bookChapters[newChapterIndex];
                this.displayChapter();
            }
        }

        // Initialize the app
        document.addEventListener('DOMContentLoaded', () => {
            new BibleScriptureCompanion();
        });
    </script>
</body>
    </html>
