<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bible Scripture Companion</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --background-color: #f4f4f4;
            --text-color: #333;
            --verse-highlight: #e9f3f8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            line-height: 1.8;
            background-color: var(--background-color);
            color: var(--text-color);
        }

        .container {
            width: 95%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        #app-header {
            background-color: var(--primary-color);
            color: white;
            text-align: center;
            padding: 1.5rem;
            margin-bottom: 20px;
            border-radius: 8px;
        }

        .navigation-section {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            gap: 10px;
        }

        #book-select, #chapter-select {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            background-color: white;
            font-size: 16px;
        }

        #scripture-content {
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
            padding: 25px;
            min-height: 400px;
            max-height: 500px;
            overflow-y: auto;
        }

        .verse {
            display: flex;
            margin-bottom: 10px;
            padding: 5px;
            transition: background-color 0.3s ease;
        }

        .verse:hover {
            background-color: var(--verse-highlight);
        }

        .verse-number {
            font-weight: bold;
            color: var(--secondary-color);
            margin-right: 10px;
            min-width: 30px;
        }

        .verse-text {
            flex-grow: 1;
        }

        .chapter-title {
            font-size: 1.5rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
            color: var(--primary-color);
        }

        .actions {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        .btn {
            background-color: var(--secondary-color);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .btn:hover {
            background-color: #2980b9;
        }

        /* Responsive Design */
        @media screen and (max-width: 768px) {
            .navigation-section {
                flex-direction: column;
            }

            #book-select, #chapter-select {
                width: 100%;
                margin-bottom: 10px;
            }

            #scripture-content {
                max-height: 300px;
            }
        }
    </style>
</head>

        </div>

        <div id="scripture-content">

        </div>

        <div class="actions">
            <button id="prev-chapter" class="btn">Previous Chapter</button>
            <button id="next-chapter" class="btn">Next Chapter</button>
        </div>
    </div>

                this.bookSelect = document.getElementById('book-select');
                this.chapterSelect = document.getElementById('chapter-select');
                this.chapterDisplay = document.getElementById('chapter-display');
                this.prevChapterBtn = document.getElementById('prev-chapter');
                this.nextChapterBtn = document.getElementById('next-chapter');

                // Current navigation state

            initializeBookSelect() {
                // Populate books
                Object.keys(this.bibleStructure).forEach(book => {
                    const option = document.createElement('option');
                    option.value = book;
                    option.textContent = book;
                    this.bookSelect.appendChild(option);
                });
            }

            attachEventListeners() {
                this.bookSelect.addEventListener('change', () => this.onBookChange());
                this.chapterSelect.addEventListener('change', () => this.displayChapter());
                this.prevChapterBtn.addEventListener('click', () => this.navigateChapter(-1));
                this.nextChapterBtn.addEventListener('click', () => this.navigateChapter(1));
            }

            onBookChange() {
                const selectedBook = this.bookSelect.value;
                
                // Reset chapter select
                this.chapterSelect.innerHTML = '<option value="">Select Chapter</option>';

                // Populate chapters for selected book
                if (selectedBook) {
                    Object.keys(this.bibleStructure[selectedBook]).forEach(chapter => {
                        const option = document.createElement('option');
                        option.value = chapter;
                        option.textContent = `Chapter ${chapter}`;
                        this.chapterSelect.appendChild(option);
                    });
                }
            }

            displayChapter() {
                const book = this.bookSelect.value;
                const chapter = this.chapterSelect.value;

                if (book && chapter) {
                    // Store current navigation state
                    this.currentBook = book;
                    this.currentChapter = parseInt(chapter);

                    // Clear previous chapter content
                    this.chapterDisplay.innerHTML = '';

                    // Add chapter title
                    const chapterTitle = document.createElement('div');
                    chapterTitle.classList.add('chapter-title');
                    chapterTitle.textContent = `${book} - Chapter ${chapter}`;
                    this.chapterDisplay.appendChild(chapterTitle);

                    // Render verses
                    const verses = this.bibleStructure[book][chapter];
                    verses.forEach((verseText, index) => {
                        const verseElement = document.createElement('div');
                        verseElement.classList.add('verse');
                        verseElement.innerHTML = `
                            <span class="verse-number">${index + 1}</span>
                            <span class="verse-text">${verseText}</span>
                        `;
                        this.chapterDisplay.appendChild(verseElement);
                    });

                    // Scroll to top of chapter
                    this.chapterDisplay.scrollTop = 0;
                }
            }

            navigateChapter(direction) {
                if (!this.currentBook || this.currentChapter === null) return;

                const bookChapters = Object.keys(this.bibleStructure[this.currentBook]);
                const currentChapterIndex = bookChapters.indexOf(this.currentChapter.toString());
                
                let newChapterIndex = currentChapterIndex + direction;

                // Wrap around if needed
                if (newChapterIndex < 0) {
                    newChapterIndex = bookChapters.length - 1;
                } else if (newChapterIndex >= bookChapters.length) {
                    newChapterIndex = 0;
                }

                // Update selects and display
                this.chapterSelect.value = bookChapters[newChapterIndex];
                this.displayChapter();
            }
        }

        // Initialize the app
        document.addEventListener('DOMContentLoaded', () => {
            new BibleScriptureCompanion();
        });
    </script>
